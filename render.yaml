# Render Blueprint — marketing site (Next.js)
# Apply: Dashboard → Blueprints → New Blueprint Instance → select this repo
# After deploy: Environment (secrets below), Custom Domains.
# Contact form uses EmailJS in the browser (no server mail env vars).

services:
  - type: web
    name: outbound-growth-website
    runtime: node
    region: frankfurt
    # Use `starter` or higher when you need always-on (free tier spins down after inactivity)
    plan: free
    branch: main
    autoDeploy: true
    # Install devDependencies (Tailwind, PostCSS, ESLint) — do not set NODE_ENV=production for install
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Required for /admin client-side gate (set in Dashboard)
      - key: NEXT_PUBLIC_ADMIN_PASS
        sync: false
      # Optional: admin panel reads historical Firestore submissions (EmailJS does not write here)
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
