# Render Blueprint — marketing site (Next.js)
# Apply: Dashboard → Blueprints → New Blueprint Instance → select this repo
# After deploy: Environment (secrets below), Custom Domains.
# Optional later in Dashboard: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, WEBHOOK_URL (see env.example).

services:
  - type: web
    name: outbound-growth-website
    runtime: node
    region: frankfurt
    # Use `starter` or higher when you need always-on (free tier spins down after inactivity)
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Required for /admin client-side gate (set in Dashboard)
      - key: NEXT_PUBLIC_ADMIN_PASS
        sync: false
      # Firestore contact form (set in Dashboard)
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
